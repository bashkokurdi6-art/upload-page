<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Admin Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }
    .sidebar {
      border-right: 1px solid #1f2937;
      overflow-y: auto;
      background: #111827;
    }
    .sidebar h2 {
      margin: 0;
      padding: 16px;
      color: #22d3ee;
      border-bottom: 1px solid #1f2937;
    }
    .session {
      padding: 14px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
    }
    .session:hover, .session.active {
      background: #1e293b;
    }
    .main {
      display: flex;
      flex-direction: column;
    }
    .top {
      padding: 16px;
      border-bottom: 1px solid #1f2937;
      color: #22d3ee;
      font-weight: bold;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #0b1220;
    }
    .msg {
      max-width: 75%;
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      word-break: break-word;
      line-height: 1.5;
    }
    .user {
      background: white;
      color: #111827;
      margin-right: auto;
    }
    .admin {
      background: #06b6d4;
      color: white;
      margin-left: auto;
    }
    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid #1f2937;
      background: #111827;
    }
    .composer input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }
    button {
      background: #06b6d4;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    .muted {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <h2>Chat Sessions</h2>
      <div id="sessionList"></div>
    </div>

    <div class="main">
      <div class="top" id="chatTitle">Choose a session</div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input id="messageInput" type="text" placeholder="Write reply..." />
        <button onclick="sendReply()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://igydtqampcfbvyymlmxg.supabase.co";
    const supabaseKey = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentSessionId = null;
    let poller = null;

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadSessions() {
      const { data, error } = await supabase
        .from("chat_sessions")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const list = document.getElementById("sessionList");
      list.innerHTML = "";

      (data || []).forEach(row => {
        const div = document.createElement("div");
        div.className = "session" + (row.id === currentSessionId ? " active" : "");
        div.innerHTML = `
          <div><strong>${escapeHtml(row.customer_name || "No name")}</strong></div>
          <div class="muted">${escapeHtml(row.customer_phone || "-")}</div>
        `;
        div.onclick = async () => {
          currentSessionId = row.id;
          document.getElementById("chatTitle").textContent =
            "Chat with " + (row.customer_name || "User") + " - " + (row.customer_phone || "");
          await loadSessions();
          await loadMessages();
        };
        list.appendChild(div);
      });
    }

    async function loadMessages() {
      if (!currentSessionId) return;

      const { data, error } = await supabase
        .from("chat_messages")
        .select("*")
        .eq("session_id", currentSessionId)
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      const box = document.getElementById("messages");
      box.innerHTML = "";

      (data || []).forEach(row => {
        const div = document.createElement("div");
        div.className = "msg " + (row.sender === "admin" ? "admin" : "user");
        div.innerHTML = escapeHtml(row.message);
        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    }

    async function sendReply() {
      const input = document.getElementById("messageInput");
      const message = input.value.trim();

      if (!currentSessionId || !message) return;

      input.value = "";

      const { error } = await supabase
        .from("chat_messages")
        .insert([{
          session_id: currentSessionId,
          sender: "admin",
          message: message
        }]);

      if (error) {
        console.error(error);
        alert("Reply failed.");
        return;
      }

      await loadMessages();
      await loadSessions();
    }

    function startPolling() {
      if (poller) clearInterval(poller);
      poller = setInterval(async () => {
        await loadSessions();
        await loadMessages();
      }, 2000);
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendReply();
    });

    loadSessions();
    startPolling();
  </script>
</body>
</html>
