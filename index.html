<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فۆرمی زانیاری</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.form-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:350px;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.9;
}

.preview{
margin-top:10px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:10px;
}

.success{
display:none;
text-align:center;
margin-top:10px;
color:#00ff9d;
font-weight:bold;
}

</style>
</head>

<body>

<div class="form-box">

<h2>فۆرمی زانیاری</h2>

<form action="https://formspree.io/f/mqedjear" method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="ناوی سیانی" required>

<input type="tel" name="phone" placeholder="ژمارە مۆبایل" required>

<input type="text" name="departure" placeholder="کاتی دەرچوون">

<input type="text" name="return" placeholder="کاتی گەڕانەوە">

<input type="file" name="passport" id="fileInput">

<div class="preview">
<img id="previewImg">
</div>

<button type="submit">ناردن</button>

<div class="success" id="successMsg">
ناردرا بە سەرکەوتوویی ✔
</div>

</form>

</div>

<script>

const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("previewImg");

fileInput.onchange=function(){
const file=this.files[0];
if(file){
preview.src=URL.createObjectURL(file);
}
}

</script>

</body>
</html>
