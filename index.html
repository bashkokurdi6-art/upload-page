<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیواک - حەج و عومرە</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');

body{
  margin:0;
  font-family:'Noto Sans Arabic', sans-serif;
  background:#020617;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  background:#020617;
}

/* PAGE */
.page{
  display:none;
  padding:15px;
  animation:fade 0.4s;
}

.active{ display:block; }

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-bottom:12px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#16a34a;
  border:none;
  border-radius:10px;
  color:white;
  margin-top:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav button{
  background:none;
  color:white;
  border:none;
}
</style>
</head>

<body>

<header>🕋 سیواک</header>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3>📖 زانیاری حەج</h3>
    <p>هەنگاوەکان و ڕێنمایی.</p>
  </div>

  <div class="card">
    <h3>🕌 مزگەوتی نەبەوی</h3>
    <p>ناسینی مەدینە.</p>
  </div>
</div>

<!-- HAJJ -->
<div id="hajj" class="page">
  <div class="card">
    <h3>📖 هەنگاوەکانی حەج</h3>
    <p>1. ئحرام<br>2. طواف<br>3. سعی<br>4. عەرەفات</p>
  </div>
</div>

<!-- OFFERS -->
<div id="offers" class="page">
  <div class="card">
    <h3>💰 ئۆفەر</h3>
    <p>حەج: 2000$</p>
    <p>عومرە: 1200$</p>
  </div>
</div>

<!-- BOOKING -->
<div id="booking" class="page">
  <div class="card">
    <h3>📩 حجز</h3>

    <form action="https://formspree.io/f/mgorjdjr" method="POST">
      <input type="text" name="name" placeholder="ناو" required><br><br>
      <input type="email" name="email" placeholder="ئیمەیڵ" required><br><br>
      <button>ناردن</button>
    </form>

  </div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('hajj')">📖</button>
<button onclick="show('offers')">💰</button>
<button onclick="show('booking')">📩</button>
</div>

<script>
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
