<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیواک - حەج و عومرە</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans Arabic',sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  background:#020617;
}

/* HERO */
.hero{
  background:url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f") center/cover;
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border-radius:15px;
  margin:15px;
}

/* CARD */
.card{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#16a34a;
  border:none;
  border-radius:8px;
  color:white;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav button{
  background:none;
  color:white;
  border:none;
}
.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<header>🕋 سیواک</header>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">بەخێربێیت بۆ حەج و عومرە</div>

<div class="card">
<h3>📖 زانیاری حەج</h3>
<p>هەموو هەنگاوەکانی حەج و عومرە.</p>
</div>

<div class="card">
<h3>🕌 مزگەوتی نەبەوی</h3>
<p>شوێنێکی پیرۆز لە مەدینە.</p>
</div>

<div class="card">
<h3>💰 ئۆفەرەکان</h3>
<p>حەج: 2000$</p>
<p>عومرە: 1200$</p>
<button onclick="show('booking')">حجز بکە</button>
</div>

</div>

<!-- BOOKING -->
<div id="booking" class="page">

<div class="card">
<h3>📩 حجز</h3>

<form action="https://formspree.io/f/mgorjdjr" method="POST">

<input type="text" name="name" placeholder="ناوی تەواو" required>
<input type="email" name="email" placeholder="ئیمەیڵ" required>

<textarea name="message" placeholder="داواکاری"></textarea>

<button type="submit">ناردن</button>

</form>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('booking')">📩</button>
</div>

<script>
function show(p){
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}
</script>

</body>
</html>
