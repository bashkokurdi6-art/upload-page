<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Payment Form</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef2ff);
      color: #111827;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      border: none;
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .number-box {
      background: #f3f4f6;
      border: 1px dashed #9ca3af;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .number {
      font-size: 22px;
      font-weight: bold;
      word-break: break-word;
    }
    .msg {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .ok { background: #dcfce7; color: #166534; }
    .err { background: #fee2e2; color: #991b1b; }
    .copy-btn {
      margin-top: 10px;
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SIWAK Payment</h1>
      <div class="sub">تکایە پارەکە بنێرە، پاشان فۆڕمەکە پڕ بکەوە</div>

      <div class="grid">
        <select id="paymentType">
          <option value="FIB">FIB</option>
          <option value="FastPay">FastPay</option>
          <option value="Qi Card">Qi Card</option>
        </select>

        <div class="number-box">
          <div class="label">ژمارەی ناردنی پارە</div>
          <div id="paymentNumber" class="number">Loading...</div>
          <button type="button" id="copyBtn" class="copy-btn">Copy Number</button>
        </div>

        <input type="text" id="fullName" placeholder="ناوی سیانی" />
        <input type="text" id="phone" placeholder="ژمارەی مۆبایل" />
        <input type="text" id="tripleCode" placeholder="سێ خانە" />
        <input type="file" id="screenshot" accept="image/*" />
        <textarea id="note" placeholder="تێبینی"></textarea>
        <button id="submitBtn">ناردن</button>

        <div id="msgBox"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://igydtqampcfbvyymlmxg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const paymentTypeEl = document.getElementById("paymentType");
    const paymentNumberEl = document.getElementById("paymentNumber");
    const msgBox = document.getElementById("msgBox");

    let settingsData = {
      fib_number: "",
      fastpay_number: "",
      qi_number: ""
    };

    function showMsg(text, type = "ok") {
      msgBox.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    function getCurrentNumber() {
      const type = paymentTypeEl.value;
      if (type === "FIB") return settingsData.fib_number || "";
      if (type === "FastPay") return settingsData.fastpay_number || "";
      if (type === "Qi Card") return settingsData.qi_number || "";
      return "";
    }

    function updateNumberView() {
      const num = getCurrentNumber();
      paymentNumberEl.textContent = num || "No number";
    }

    async function loadSettings() {
      const { data, error } = await supabase
        .from("payment_settings")
        .select("*")
        .eq("id", 1)
        .single();

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      settingsData = data;
      updateNumberView();
    }

    async function uploadScreenshot(file) {
      const ext = file.name.split(".").pop();
      const fileName = `shot_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const filePath = fileName;

      const { error: uploadError } = await supabase.storage
        .from("payment-screenshots")
        .upload(filePath, file);

      if (uploadError) {
        throw uploadError;
      }

      const { data } = supabase.storage
        .from("payment-screenshots")
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function submitForm() {
      const full_name = document.getElementById("fullName").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const triple_code = document.getElementById("tripleCode").value.trim();
      const payment_type = paymentTypeEl.value;
      const note = document.getElementById("note").value.trim();
      const screenshotFile = document.getElementById("screenshot").files[0];

      if (!full_name || !phone || !triple_code || !payment_type || !screenshotFile) {
        showMsg("تکایە هەموو خانە گرنگەکان پڕ بکە", "err");
        return;
      }

      try {
        showMsg("چاوەڕێبە...");

        const screenshot_url = await uploadScreenshot(screenshotFile);

        const { error } = await supabase
          .from("payment_requests")
          .insert([{
            full_name,
            phone,
            triple_code,
            payment_type,
            screenshot_url,
            note
          }]);

        if (error) {
          showMsg(error.message, "err");
          return;
        }

        showMsg("داواکارییەکەت بە سەرکەوتوویی نێردرا", "ok");

        document.getElementById("fullName").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("tripleCode").value = "";
        document.getElementById("note").value = "";
        document.getElementById("screenshot").value = "";
        paymentTypeEl.value = "FIB";
        updateNumberView();
      } catch (err) {
        showMsg(err.message || "هەڵەیەک ڕوویدا", "err");
      }
    }

    document.getElementById("copyBtn").addEventListener("click", async () => {
      const num = getCurrentNumber();
      if (!num) {
        showMsg("ژمارە نییە", "err");
        return;
      }
      await navigator.clipboard.writeText(num);
      showMsg("ژمارەکە کۆپی کرا");
    });

    paymentTypeEl.addEventListener("change", updateNumberView);
    document.getElementById("submitBtn").addEventListener("click", submitForm);

    loadSettings();
  </script>
</body>
</html>
