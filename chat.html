<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Live Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #111827;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }
    .top {
      background: #0f172a;
      color: white;
      padding: 16px;
      font-weight: bold;
      font-size: 20px;
    }
    .setup {
      padding: 15px;
      border-bottom: 1px solid #e5e7eb;
      display: grid;
      gap: 10px;
    }
    input, button {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
    }
    button {
      background: #06b6d4;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #eef2ff;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      line-height: 1.5;
      word-break: break-word;
    }
    .user {
      background: #06b6d4;
      color: white;
      margin-left: auto;
    }
    .admin {
      background: white;
      color: #111827;
      border: 1px solid #cbd5e1;
      margin-right: auto;
    }
    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }
    .composer input {
      flex: 1;
    }
    .hidden { display: none; }
    .status {
      padding: 8px 15px;
      font-size: 13px;
      color: #475569;
      background: #f8fafc;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">SIWAK Live Chat</div>

    <div class="setup" id="setupBox">
      <input id="customerName" type="text" placeholder="Your name" />
      <input id="customerPhone" type="text" placeholder="Your phone" />
      <button onclick="startChat()">Start Chat</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer hidden" id="composer">
      <input id="messageInput" type="text" placeholder="Write your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="status" id="statusText">Ready.</div>
  </div>

  <script>
    const supabaseUrl = "https://igydtqampcfbvyymlmxg.supabase.co";
    const supabaseKey = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let sessionId = localStorage.getItem("siwak_chat_session_id") || null;
    let poller = null;

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function startChat() {
      const name = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("customerPhone").value.trim();

      if (!name || !phone) {
        alert("Please enter name and phone.");
        return;
      }

      setStatus("Creating chat...");

      const { data, error } = await supabase
        .from("chat_sessions")
        .insert([{ customer_name: name, customer_phone: phone }])
        .select()
        .single();

      if (error) {
        console.error(error);
        setStatus("Error: " + error.message);
        alert("Could not start chat.");
        return;
      }

      sessionId = data.id;
      localStorage.setItem("siwak_chat_session_id", sessionId);

      document.getElementById("setupBox").classList.add("hidden");
      document.getElementById("composer").classList.remove("hidden");

      await sendWelcomeMessage();
      await loadMessages();
      startPolling();

      setStatus("Chat started.");
    }

    async function sendWelcomeMessage() {
      await supabase
        .from("chat_messages")
        .insert([{
          session_id: sessionId,
          sender: "admin",
          message: "Hello, welcome to SIWAK. Please send your question."
        }]);
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const message = input.value.trim();

      if (!message || !sessionId) return;

      input.value = "";
      setStatus("Sending...");

      const { error } = await supabase
        .from("chat_messages")
        .insert([{
          session_id: sessionId,
          sender: "user",
          message: message
        }]);

      if (error) {
        console.error(error);
        setStatus("Send error: " + error.message);
        alert("Message failed.");
        return;
      }

      await loadMessages();
      setStatus("Message sent.");
    }

    async function loadMessages() {
      if (!sessionId) return;

      const { data, error } = await supabase
        .from("chat_messages")
        .select("*")
        .eq("session_id", sessionId)
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        setStatus("Load error: " + error.message);
        return;
      }

      const box = document.getElementById("messages");
      box.innerHTML = "";

      (data || []).forEach(row => {
        const div = document.createElement("div");
        div.className = "msg " + (row.sender === "user" ? "user" : "admin");
        div.innerHTML = escapeHtml(row.message);
        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    }

    function startPolling() {
      if (poller) clearInterval(poller);
      poller = setInterval(loadMessages, 2000);
    }

    async function boot() {
      if (sessionId) {
        document.getElementById("setupBox").classList.add("hidden");
        document.getElementById("composer").classList.remove("hidden");
        await loadMessages();
        startPolling();
        setStatus("Connected.");
      }
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    boot();
  </script>
</body>
</html>
