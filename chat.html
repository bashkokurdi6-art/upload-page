<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#ece5dd;
}

.header{
background:#075e54;
color:white;
padding:15px;
font-size:18px;
}

.status{
font-size:12px;
opacity:0.8;
}

.chat{
height:75vh;
overflow:auto;
padding:10px;
}

.msg{
padding:10px;
margin:6px;
border-radius:8px;
max-width:70%;
}

.user{
background:#dcf8c6;
margin-left:auto;
}

.admin{
background:white;
}

.typing{
font-size:12px;
padding:5px;
color:#666;
}

.input{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
padding:10px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
}

button{
background:#075e54;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
margin-left:10px;
}

</style>
</head>

<body>

<div class="header">
Support
<div id="status" class="status">offline</div>
</div>

<div id="chat" class="chat"></div>

<div id="typing" class="typing"></div>

<div class="input">
<input id="msg" placeholder="Write message" oninput="typing()">
<button onclick="send()">Send</button>
</div>

<script>

const supabaseUrl="YOUR_SUPABASE_URL"
const supabaseKey="YOUR_ANON_KEY"

const sb=supabase.createClient(supabaseUrl,supabaseKey)

async function send(){

let text=document.getElementById("msg").value
if(!text)return

await sb.from("messages")
.insert([{sender:"user",message:text}])

document.getElementById("msg").value=""

}

async function load(){

let {data}=await sb
.from("messages")
.select("*")
.order("created_at",{ascending:true})

let box=document.getElementById("chat")
box.innerHTML=""

data.forEach(m=>{

let div=document.createElement("div")
div.className="msg "+m.sender
div.innerText=m.message
box.appendChild(div)

})

box.scrollTop=box.scrollHeight

}

async function typing(){

await sb.from("typing_status")
.insert([{user_type:"user",is_typing:true}])

}

async function checkTyping(){

let {data}=await sb
.from("typing_status")
.select("*")
.order("created_at",{ascending:false})
.limit(1)

if(data[0]?.user_type=="admin")
document.getElementById("typing").innerText="admin typing..."
else
document.getElementById("typing").innerText=""

}

async function checkOnline(){

let {data}=await sb
.from("online_status")
.select("*")
.order("created_at",{ascending:false})
.limit(1)

if(data[0]?.user_type=="admin" && data[0]?.is_online)
document.getElementById("status").innerText="online"
else
document.getElementById("status").innerText="offline"

}

sb.from("online_status").insert([{user_type:"user",is_online:true}])

load()

setInterval(load,1500)
setInterval(checkTyping,1500)
setInterval(checkOnline,3000)

</script>

</body>
</html>
