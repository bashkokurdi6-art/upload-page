<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Support</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0b141a;
      color:#e9edef;
    }
    .app{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:#111b21;
    }
    .topbar{
      background:#202c33;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      position:sticky;
      top:0;
      z-index:2;
    }
    .avatar{
      width:42px;
      height:42px;
      border-radius:50%;
      background:#25d366;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:bold;
    }
    .title{font-weight:700;font-size:16px}
    .sub{font-size:12px;color:#9aa6ad;margin-top:2px}
    .chat{
      flex:1;
      padding:14px 10px 100px;
      overflow-y:auto;
      background:
        linear-gradient(rgba(17,27,33,0.94), rgba(17,27,33,0.94)),
        url("https://www.transparenttextures.com/patterns/cubes.png");
    }
    .row{
      display:flex;
      margin:8px 0;
    }
    .row.user{justify-content:flex-end}
    .row.admin{justify-content:flex-start}
    .bubble{
      max-width:78%;
      padding:10px 12px 18px;
      border-radius:12px;
      position:relative;
      line-height:1.45;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .row.user .bubble{
      background:#005c4b;
      border-top-right-radius:4px;
    }
    .row.admin .bubble{
      background:#202c33;
      border-top-left-radius:4px;
    }
    .meta{
      position:absolute;
      right:10px;
      bottom:4px;
      font-size:10px;
      color:#b7c4cc;
    }
    .typing{
      min-height:20px;
      padding:0 16px 8px;
      color:#25d366;
      font-size:12px;
    }
    .composer{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:520px;
      display:flex;
      gap:8px;
      padding:10px;
      background:#202c33;
      z-index:3;
    }
    .composer input{
      flex:1;
      border:none;
      outline:none;
      border-radius:24px;
      padding:14px 16px;
      font-size:14px;
      background:#2a3942;
      color:#fff;
    }
    .composer button{
      width:48px;
      height:48px;
      border:none;
      border-radius:50%;
      background:#25d366;
      color:#111b21;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }
    .empty,.error{
      text-align:center;
      margin-top:30px;
      color:#8fa3ad;
      font-size:13px;
    }
    .error{color:#ff8a8a}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="avatar">S</div>
      <div>
        <div class="title">SIWAK Support</div>
        <div class="sub" id="onlineStatus">connecting...</div>
      </div>
    </div>

    <div class="chat" id="chatBox">
      <div class="empty">چات ئامادەیە...</div>
    </div>

    <div class="typing" id="typingBox"></div>
  </div>

  <div class="composer">
    <input id="messageInput" type="text" placeholder="پەیام بنووسە..." />
    <button id="sendBtn">➤</button>
  </div>

  <script>
    const SUPABASE_URL = "https://igydtqampcfbvyymlmxg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const chatBox = document.getElementById("chatBox");
    const typingBox = document.getElementById("typingBox");
    const onlineStatus = document.getElementById("onlineStatus");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let typingTimer = null;

    function esc(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(v) {
      const d = new Date(v);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    async function loadMessages() {
      const { data, error } = await client
        .from("messages")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        chatBox.innerHTML = `<div class="error">هەڵە لە بارکردنی پەیامەکان<br>${esc(error.message)}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        chatBox.innerHTML = `<div class="empty">هیچ پەیامێک نییە</div>`;
        return;
      }

      chatBox.innerHTML = data.map(msg => `
        <div class="row ${msg.sender}">
          <div class="bubble">
            ${esc(msg.message)}
            <div class="meta">${formatTime(msg.created_at)}</div>
          </div>
        </div>
      `).join("");

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      sendBtn.disabled = true;

      const { error } = await client
        .from("messages")
        .insert([{ sender: "user", message: text }]);

      if (error) {
        alert("هەڵە لە ناردنی پەیام: " + error.message);
      } else {
        input.value = "";
        await setTyping(false);
        await loadMessages();
      }

      sendBtn.disabled = false;
      input.focus();
    }

    async function setTyping(value) {
      await client.from("typing_status").insert([
        { user_type: "user", is_typing: value }
      ]);
    }

    async function setOnline(value) {
      await client.from("online_status").insert([
        { user_type: "user", is_online: value }
      ]);
    }

    async function checkTyping() {
      const { data } = await client
        .from("typing_status")
        .select("*")
        .eq("user_type", "admin")
        .order("created_at", { ascending: false })
        .limit(1);

      if (data && data[0]) {
        const age = Date.now() - new Date(data[0].created_at).getTime();
        typingBox.textContent = data[0].is_typing && age < 3000 ? "ئەدمین خەریکی نووسینە..." : "";
      } else {
        typingBox.textContent = "";
      }
    }

    async function checkOnline() {
      const { data } = await client
        .from("online_status")
        .select("*")
        .eq("user_type", "admin")
        .order("created_at", { ascending: false })
        .limit(1);

      if (data && data[0]) {
        const age = Date.now() - new Date(data[0].created_at).getTime();
        onlineStatus.textContent = age < 20000 && data[0].is_online ? "online" : "offline";
      } else {
        onlineStatus.textContent = "offline";
      }
    }

    input.addEventListener("input", async () => {
      await setTyping(true);
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => setTyping(false), 1500);
    });

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    sendBtn.addEventListener("click", sendMessage);

    window.addEventListener("load", async () => {
      await setOnline(true);
      await loadMessages();
      await checkTyping();
      await checkOnline();
      input.focus();
    });

    setInterval(async () => {
      await setOnline(true);
      await loadMessages();
      await checkTyping();
      await checkOnline();
    }, 2000);
  </script>
</body>
</html>
