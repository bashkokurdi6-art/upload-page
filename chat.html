<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b141a;
      color: #e9edef;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #111b21;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: #202c33;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #25d366;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    .top-info {
      flex: 1;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #e9edef;
    }
    .sub {
      font-size: 12px;
      color: #8696a0;
      margin-top: 2px;
    }
    .chat {
      flex: 1;
      padding: 14px 10px 90px;
      overflow-y: auto;
      background:
        linear-gradient(rgba(17,27,33,0.94), rgba(17,27,33,0.94)),
        url("https://www.transparenttextures.com/patterns/cubes.png");
    }
    .row {
      display: flex;
      margin: 8px 0;
    }
    .row.user { justify-content: flex-end; }
    .row.admin { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 10px 12px 18px;
      border-radius: 12px;
      position: relative;
      line-height: 1.4;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .row.user .bubble {
      background: #005c4b;
      color: #e9edef;
      border-top-right-radius: 4px;
    }
    .row.admin .bubble {
      background: #202c33;
      color: #e9edef;
      border-top-left-radius: 4px;
    }
    .meta {
      position: absolute;
      right: 10px;
      bottom: 4px;
      font-size: 10px;
      color: #9fb3bd;
    }
    .typing {
      padding: 0 16px 8px;
      font-size: 12px;
      color: #25d366;
      min-height: 20px;
      background: #111b21;
    }
    .composer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 520px;
      background: #202c33;
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .composer input {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 24px;
      padding: 14px 16px;
      background: #2a3942;
      color: #e9edef;
      font-size: 14px;
    }
    .composer button {
      border: none;
      background: #25d366;
      color: #111b21;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }
    .empty {
      text-align: center;
      color: #8696a0;
      margin-top: 30px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="avatar">S</div>
      <div class="top-info">
        <div class="title">SIWAK Support</div>
        <div class="sub" id="onlineStatus">connecting...</div>
      </div>
    </div>

    <div class="chat" id="chatBox">
      <div class="empty">چات ئامادەیە...</div>
    </div>

    <div class="typing" id="typingBox"></div>
  </div>

  <div class="composer">
    <input id="messageInput" type="text" placeholder="پەیام بنووسە..." />
    <button id="sendBtn">➤</button>
  </div>

  <script>
    const SUPABASE_URL = "SUPABASE_URL";
    const SUPABASE_KEY = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const chatBox = document.getElementById("chatBox");
    const typingBox = document.getElementById("typingBox");
    const onlineStatus = document.getElementById("onlineStatus");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let typingTimeout = null;

    function formatTime(dateString) {
      const d = new Date(dateString);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadMessages() {
      const { data, error } = await client
        .from("messages")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        chatBox.innerHTML = '<div class="empty">هەڵە لە بارکردنی پەیامەکان</div>';
        return;
      }

      if (!data || data.length === 0) {
        chatBox.innerHTML = '<div class="empty">هیچ پەیامێک نییە</div>';
        return;
      }

      chatBox.innerHTML = data.map(msg => `
        <div class="row ${msg.sender}">
          <div class="bubble">
            ${escapeHtml(msg.message)}
            <div class="meta">${formatTime(msg.created_at)}</div>
          </div>
        </div>
      `).join("");

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      const { error } = await client
        .from("messages")
        .insert([{ sender: "user", message: text }]);

      if (!error) {
        input.value = "";
        await setTyping(false);
        loadMessages();
      }
    }

    async function setTyping(value) {
      await client.from("typing_status").insert([
        { user_type: "user", is_typing: value }
      ]);
    }

    async function setOnline(value) {
      await client.from("online_status").insert([
        { user_type: "user", is_online: value }
      ]);
    }

    async function checkTyping() {
      const { data } = await client
        .from("typing_status")
        .select("*")
        .eq("user_type", "admin")
        .order("created_at", { ascending: false })
        .limit(1);

      if (data && data[0] && data[0].is_typing) {
        const diff = Date.now() - new Date(data[0].created_at).getTime();
        typingBox.textContent = diff < 3000 ? "ئەدمین خەریکی نووسینە..." : "";
      } else {
        typingBox.textContent = "";
      }
    }

    async function checkOnline() {
      const { data } = await client
        .from("online_status")
        .select("*")
        .eq("user_type", "admin")
        .order("created_at", { ascending: false })
        .limit(1);

      if (data && data[0] && data[0].is_online) {
        const diff = Date.now() - new Date(data[0].created_at).getTime();
        onlineStatus.textContent = diff < 20000 ? "online" : "offline";
      } else {
        onlineStatus.textContent = "offline";
      }
    }

    input.addEventListener("input", async () => {
      await setTyping(true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => setTyping(false), 1500);
    });

    input.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    sendBtn.addEventListener("click", sendMessage);

    window.addEventListener("load", async () => {
      await setOnline(true);
      await loadMessages();
      await checkTyping();
      await checkOnline();
    });

    setInterval(() => {
      setOnline(true);
      loadMessages();
      checkTyping();
      checkOnline();
    }, 2000);
  </script>
</body>
</html>
