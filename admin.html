<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIWAK Admin Panel</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0b0f1a;
color:white;
padding:20px
}

.box{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:#1f2937;
color:white
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#eab308;
cursor:pointer;
font-weight:bold
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:10px
}
</style>
</head>

<body>

<h2>SIWAK Admin Panel</h2>

<div class="box">

<label>نرخی ڤیزە</label>
<input id="visaPrice">

<label>نرخی ڕەوزە</label>
<input id="rawzaPrice">

<label>FIB</label>
<input id="fibNumber">

<label>FastPay</label>
<input id="fastpayNumber">

<label>QiCard</label>
<input id="qicardNumber">

<button onclick="saveSettings()">پاشەکەوتکردن</button>

</div>

<h3>داواکارییەکان</h3>

<div id="requests"></div>

<script>

const SUPABASE_URL="https://igydtqampcfbvyymlmxg.supabase.co"
const SUPABASE_KEY="sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadSettings(){

const {data}=await supabase
.from("app_settings")
.select("*")
.eq("id",1)
.single()

if(!data)return

visaPrice.value=data.visa_price
rawzaPrice.value=data.rawza_price
fibNumber.value=data.fib_number
fastpayNumber.value=data.fastpay_number
qicardNumber.value=data.qicard_number

}

async function saveSettings(){

await supabase
.from("app_settings")
.update({
visa_price:visaPrice.value,
rawza_price:rawzaPrice.value,
fib_number:fibNumber.value,
fastpay_number:fastpayNumber.value,
qicard_number:qicardNumber.value
})
.eq("id",1)

alert("پاشەکەوت کرا")

}

async function loadRequests(){

const {data}=await supabase
.from("visa_requests")
.select("*")
.order("created_at",{ascending:false})

if(!data)return

requests.innerHTML=""

data.forEach(r=>{

requests.innerHTML+=`
<div class="card">
<b>${r.customer_name}</b><br>
${r.mobile}<br>
${r.status}
</div>
`

})

}

loadSettings()
loadRequests()

</script>

</body>
</html>
