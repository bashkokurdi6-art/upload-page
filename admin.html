<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Admin Panel</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.10), transparent 28%),
        linear-gradient(135deg, #05070d, #0f172a, #111827);
      color: #fff;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .top-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      font-size: 30px;
      font-weight: bold;
      box-shadow: 0 12px 30px rgba(245, 158, 11, 0.35);
    }

    .title {
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 14px;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.38);
      margin-bottom: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    @media (max-width: 820px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    h2 {
      margin-bottom: 14px;
      font-size: 22px;
    }

    input, button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 15px;
      outline: none;
    }

    input {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.14);
      background: rgba(255,255,255,0.08);
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .btn-gold {
      background: linear-gradient(135deg, #facc15, #f59e0b);
      color: #111827;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.25);
    }

    .btn-blue {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .btn-green {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      width: auto;
      min-width: 120px;
    }

    .btn-red {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      width: auto;
      min-width: 120px;
    }

    .btn-gray {
      background: linear-gradient(135deg, #475569, #334155);
      color: #fff;
      width: auto;
      min-width: 120px;
    }

    .btn-logout {
      max-width: 180px;
      margin-left: auto;
      display: block;
    }

    .hidden {
      display: none;
    }

    .msg {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.7;
    }

    .ok {
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.22);
    }

    .err {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.22);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .request-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 14px;
      color: #e5e7eb;
      line-height: 1.8;
    }

    @media (max-width: 700px) {
      .meta {
        grid-template-columns: 1fr;
      }
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .pending {
      background: rgba(250, 204, 21, 0.16);
      color: #fde68a;
      border: 1px solid rgba(250, 204, 21, 0.22);
    }

    .approved {
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.22);
    }

    .rejected {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.22);
    }

    .thumb {
      width: 100%;
      max-width: 260px;
      border-radius: 16px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .small {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.8;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-header">
      <div class="logo">S</div>
      <div class="title">SIWAK Admin</div>
      <div class="subtitle">بەڕێوەبردنی ژمارەی پارەدان و داواکارییەکان</div>
    </div>

    <div id="globalMsg"></div>

    <div id="authBox" class="grid-2">
      <div class="card">
        <h2>Signup</h2>
        <div class="grid">
          <input type="email" id="signupEmail" placeholder="Email" />
          <input type="password" id="signupPassword" placeholder="Password" />
          <button id="signupBtn" class="btn-gold">Signup</button>
          <div class="small">تەنها یەک جار هەژمار دروست بکە، پاشان هەمیشە login بکە.</div>
        </div>
      </div>

      <div class="card">
        <h2>Login</h2>
        <div class="grid">
          <input type="email" id="loginEmail" placeholder="Email" />
          <input type="password" id="loginPassword" placeholder="Password" />
          <button id="loginBtn" class="btn-blue">Login</button>
        </div>
      </div>
    </div>

    <div id="adminBox" class="hidden">
      <div class="card">
        <button id="logoutBtn" class="btn-gray btn-logout">Logout</button>
      </div>

      <div class="card">
        <h2>ژمارەکانی پارەدان</h2>
        <div class="grid">
          <input type="text" id="fibNumber" placeholder="FIB Number" />
          <input type="text" id="fastpayNumber" placeholder="FastPay Number" />
          <input type="text" id="qiNumber" placeholder="Qi Card Number" />
          <button id="saveSettingsBtn" class="btn-gold">Save Numbers</button>
        </div>
      </div>

      <div class="card">
        <div class="section-head">
          <h2>داواکارییەکان</h2>
          <button id="refreshBtn" class="btn-blue" style="width:auto; min-width:160px;">Refresh</button>
        </div>
        <div id="requestsList">Loading...</div>
      </div>
    </div>

    <div class="footer-note">SIWAK © Admin Panel</div>
  </div>

  <script>
    const SUPABASE_URL = "https://igydtqampcfbvyymlmxg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authBox = document.getElementById("authBox");
    const adminBox = document.getElementById("adminBox");
    const logoutBtn = document.getElementById("logoutBtn");
    const globalMsg = document.getElementById("globalMsg");

    function showMsg(text, type = "ok") {
      globalMsg.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    async function ensureAdminRow(user) {
      const { error } = await db
        .from("admin_users")
        .upsert([{ user_id: user.id, email: user.email }], { onConflict: "user_id" });

      if (error) showMsg(error.message, "err");
    }

    async function signup() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!email || !password) {
        showMsg("Email و Password پڕ بکە", "err");
        return;
      }

      const { data, error } = await db.auth.signUp({ email, password });

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      if (data.user) {
        await ensureAdminRow(data.user);
        showMsg("Signup سەرکەوتوو بوو");
        await checkSession();
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        showMsg("Email و Password پڕ بکە", "err");
        return;
      }

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      if (data.user) {
        showMsg("Login سەرکەوتوو بوو");
        await checkSession();
      }
    }

    async function logout() {
      await db.auth.signOut();
      authBox.classList.remove("hidden");
      adminBox.classList.add("hidden");
      showMsg("Logout کرا");
    }

    async function loadSettings() {
      const { data, error } = await db
        .from("payment_settings")
        .select("*")
        .eq("id", 1)
        .single();

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      document.getElementById("fibNumber").value = data.fib_number || "";
      document.getElementById("fastpayNumber").value = data.fastpay_number || "";
      document.getElementById("qiNumber").value = data.qi_number || "";
    }

    async function saveSettings() {
      const fib_number = document.getElementById("fibNumber").value.trim();
      const fastpay_number = document.getElementById("fastpayNumber").value.trim();
      const qi_number = document.getElementById("qiNumber").value.trim();

      const { error } = await db
        .from("payment_settings")
        .update({
          fib_number,
          fastpay_number,
          qi_number,
          updated_at: new Date().toISOString()
        })
        .eq("id", 1);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("ژمارەکان پاشەکەوت کران");
    }

    function badgeClass(status) {
      if (status === "approved") return "approved";
      if (status === "rejected") return "rejected";
      return "pending";
    }

    async function loadRequests() {
      const list = document.getElementById("requestsList");
      list.innerHTML = "Loading...";

      const { data, error } = await db
        .from("payment_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        list.innerHTML = `<div class="msg err">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = `<div class="small">هێشتا هیچ داواکارییەک نییە.</div>`;
        return;
      }

      list.innerHTML = data.map(item => `
        <div class="request-card">
          <div class="section-head">
            <h2 style="margin:0; font-size:20px;">#${item.id}</h2>
            <span class="badge ${badgeClass(item.status)}">${item.status}</span>
          </div>

          <div class="meta">
            <div><strong>ناوی سیانی:</strong> ${item.full_name}</div>
            <div><strong>ژمارەی مۆبایل:</strong> ${item.phone}</div>
            <div><strong>جۆری پارەدان:</strong> ${item.payment_type}</div>
            <div><strong>کات:</strong> ${new Date(item.created_at).toLocaleString()}</div>
            <div><strong>تێبینی:</strong> ${item.note || "-"}</div>
          </div>

          <div>
            <strong>سکرینشۆت:</strong><br />
            <a href="${item.screenshot_url}" target="_blank">کردنەوەی وێنە</a><br />
            <img class="thumb" src="${item.screenshot_url}" alt="screenshot" />
          </div>

          <div class="actions">
            <button class="btn-green" onclick="updateStatus(${item.id}, 'approved')">Approve</button>
            <button class="btn-red" onclick="updateStatus(${item.id}, 'rejected')">Reject</button>
            <button class="btn-gray" onclick="deleteRequest(${item.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    async function updateStatus(id, status) {
      const { error } = await db
        .from("payment_requests")
        .update({ status })
        .eq("id", id);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("دۆخەکە نوێکرایەوە");
      loadRequests();
    }

    async function deleteRequest(id) {
      if (!confirm("دڵنیایت لە سڕینەوە؟")) return;

      const { error } = await db
        .from("payment_requests")
        .delete()
        .eq("id", id);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("داواکارییەکە سڕایەوە");
      loadRequests();
    }

    async function checkSession() {
      const { data } = await db.auth.getSession();
      const session = data.session;

      if (session && session.user) {
        authBox.classList.add("hidden");
        adminBox.classList.remove("hidden");
        await loadSettings();
        await loadRequests();
      } else {
        authBox.classList.remove("hidden");
        adminBox.classList.add("hidden");
      }
    }

    document.getElementById("signupBtn").addEventListener("click", signup);
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
    document.getElementById("refreshBtn").addEventListener("click", loadRequests);
    logoutBtn.addEventListener("click", logout);

    db.auth.onAuthStateChange(() => checkSession());

    checkSession();

    window.updateStatus = updateStatus;
    window.deleteRequest = deleteRequest;
  </script>
</body>
</html>
