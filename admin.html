<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIWAK Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    h1, h2, h3 { margin-top: 0; }
    .grid {
      display: grid;
      gap: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .btn {
      background: #111827;
      color: white;
    }
    .btn-green {
      background: #059669;
      color: white;
    }
    .btn-red {
      background: #dc2626;
      color: white;
    }
    .btn-gray {
      background: #6b7280;
      color: white;
    }
    .hidden { display: none; }
    .msg {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }
    .ok { background: #dcfce7; color: #166534; }
    .err { background: #fee2e2; color: #991b1b; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .request-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafafa;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 14px;
      margin-bottom: 12px;
    }
    @media (max-width: 768px) {
      .meta { grid-template-columns: 1fr; }
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }
    .pending { background: #fef3c7; color: #92400e; }
    .approved { background: #dcfce7; color: #166534; }
    .rejected { background: #fee2e2; color: #991b1b; }
    .thumb {
      width: 100%;
      max-width: 220px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-top: 8px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .small {
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>SIWAK Admin Panel</h1>
        <button id="logoutBtn" class="btn-gray hidden">Logout</button>
      </div>
      <div id="globalMsg"></div>
    </div>

    <div id="authBox" class="grid-2">
      <div class="card">
        <h2>Signup</h2>
        <div class="grid">
          <input type="email" id="signupEmail" placeholder="Email" />
          <input type="password" id="signupPassword" placeholder="Password" />
          <button id="signupBtn" class="btn">Signup</button>
          <div class="small">تەنها یەک جار signup بکە، پاشان هەمیشە login بکە.</div>
        </div>
      </div>

      <div class="card">
        <h2>Login</h2>
        <div class="grid">
          <input type="email" id="loginEmail" placeholder="Email" />
          <input type="password" id="loginPassword" placeholder="Password" />
          <button id="loginBtn" class="btn">Login</button>
        </div>
      </div>
    </div>

    <div id="adminBox" class="hidden">
      <div class="card">
        <h2>Payment Numbers</h2>
        <div class="grid">
          <input type="text" id="fibNumber" placeholder="FIB Number" />
          <input type="text" id="fastpayNumber" placeholder="FastPay Number" />
          <input type="text" id="qiNumber" placeholder="Qi Card Number" />
          <button id="saveSettingsBtn" class="btn">Save Numbers</button>
        </div>
      </div>

      <div class="card">
        <div class="topbar">
          <h2>Payment Requests</h2>
          <button id="refreshBtn" class="btn">Refresh</button>
        </div>
        <div id="requestsList">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://igydtqampcfbvyymlmxg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lOotJfG-w3GgpDpD8446qA_Ba1nKV4k";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authBox = document.getElementById("authBox");
    const adminBox = document.getElementById("adminBox");
    const logoutBtn = document.getElementById("logoutBtn");
    const globalMsg = document.getElementById("globalMsg");

    function showMsg(text, type = "ok") {
      globalMsg.innerHTML = `<div class="msg ${type}">${text}</div>`;
      setTimeout(() => {
        globalMsg.innerHTML = "";
      }, 4000);
    }

    async function ensureAdminRow(user) {
      const { error } = await supabase
        .from("admin_users")
        .upsert([{ user_id: user.id, email: user.email }], { onConflict: "user_id" });

      if (error) {
        console.error(error);
        showMsg(error.message, "err");
      }
    }

    async function signup() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!email || !password) {
        showMsg("Email و Password پڕ بکە", "err");
        return;
      }

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      if (data.user && data.session) {
        await ensureAdminRow(data.user);
        showMsg("Signup سەرکەوتوو بوو");
        await checkSession();
      } else {
        showMsg("ئەگەر login نەکرد، Confirm email داخە لە Supabase", "err");
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        showMsg("Email و Password پڕ بکە", "err");
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      if (data.user) {
        await ensureAdminRow(data.user);
        showMsg("Login سەرکەوتوو بوو");
        await checkSession();
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      authBox.classList.remove("hidden");
      adminBox.classList.add("hidden");
      logoutBtn.classList.add("hidden");
      showMsg("Logout کرا");
    }

    async function loadSettings() {
      const { data, error } = await supabase
        .from("payment_settings")
        .select("*")
        .eq("id", 1)
        .single();

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      document.getElementById("fibNumber").value = data.fib_number || "";
      document.getElementById("fastpayNumber").value = data.fastpay_number || "";
      document.getElementById("qiNumber").value = data.qi_number || "";
    }

    async function saveSettings() {
      const fib_number = document.getElementById("fibNumber").value.trim();
      const fastpay_number = document.getElementById("fastpayNumber").value.trim();
      const qi_number = document.getElementById("qiNumber").value.trim();

      const { error } = await supabase
        .from("payment_settings")
        .update({
          fib_number,
          fastpay_number,
          qi_number,
          updated_at: new Date().toISOString()
        })
        .eq("id", 1);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("ژمارەکان پاشەکەوت کران");
    }

    function badgeClass(status) {
      if (status === "approved") return "approved";
      if (status === "rejected") return "rejected";
      return "pending";
    }

    async function loadRequests() {
      const list = document.getElementById("requestsList");
      list.innerHTML = "Loading...";

      const { data, error } = await supabase
        .from("payment_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        list.innerHTML = `<div class="msg err">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = `<div class="small">هیچ داواکارییەک نییە.</div>`;
        return;
      }

      list.innerHTML = data.map(item => `
        <div class="request-card">
          <div class="topbar">
            <h3>#${item.id}</h3>
            <span class="badge ${badgeClass(item.status)}">${item.status}</span>
          </div>

          <div class="meta">
            <div><strong>ناوی سیانی:</strong> ${item.full_name}</div>
            <div><strong>ژمارەی مۆبایل:</strong> ${item.phone}</div>
            <div><strong>سێ خانە:</strong> ${item.triple_code}</div>
            <div><strong>جۆری پارەدان:</strong> ${item.payment_type}</div>
            <div><strong>کات:</strong> ${new Date(item.created_at).toLocaleString()}</div>
            <div><strong>تێبینی:</strong> ${item.note ? item.note : "-"}</div>
          </div>

          <div>
            <strong>سکرینشۆت:</strong><br />
            <a href="${item.screenshot_url}" target="_blank">کردنەوەی وێنە</a><br />
            <img class="thumb" src="${item.screenshot_url}" alt="screenshot" />
          </div>

          <div class="actions">
            <button class="btn-green" onclick="updateStatus(${item.id}, 'approved')">Approve</button>
            <button class="btn-red" onclick="updateStatus(${item.id}, 'rejected')">Reject</button>
            <button class="btn-gray" onclick="deleteRequest(${item.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    async function updateStatus(id, status) {
      const { error } = await supabase
        .from("payment_requests")
        .update({ status })
        .eq("id", id);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("دۆخەکە نوێکرایەوە");
      loadRequests();
    }

    async function deleteRequest(id) {
      if (!confirm("دڵنیایت لە سڕینەوە؟")) return;

      const { error } = await supabase
        .from("payment_requests")
        .delete()
        .eq("id", id);

      if (error) {
        showMsg(error.message, "err");
        return;
      }

      showMsg("داواکارییەکە سڕایەوە");
      loadRequests();
    }

    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      const session = data.session;

      if (session && session.user) {
        authBox.classList.add("hidden");
        adminBox.classList.remove("hidden");
        logoutBtn.classList.remove("hidden");
        await loadSettings();
        await loadRequests();
      } else {
        authBox.classList.remove("hidden");
        adminBox.classList.add("hidden");
        logoutBtn.classList.add("hidden");
      }
    }

    document.getElementById("signupBtn").addEventListener("click", signup);
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
    document.getElementById("refreshBtn").addEventListener("click", loadRequests);
    logoutBtn.addEventListener("click", logout);

    supabase.auth.onAuthStateChange(() => {
      checkSession();
    });

    checkSession();

    window.updateStatus = updateStatus;
    window.deleteRequest = deleteRequest;
  </script>
</body>
</html>
