<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
margin:0;
}

.header{
background:#222;
color:white;
padding:15px;
font-size:18px;
}

.chat{
height:80vh;
overflow:auto;
padding:10px;
}

.msg{
padding:10px;
margin:6px;
border-radius:8px;
max-width:70%;
}

.user{
background:white;
}

.admin{
background:#cfe9ff;
margin-left:auto;
}

.input{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
padding:10px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
}

button{
background:#222;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
margin-left:10px;
}

</style>
</head>

<body>

<div class="header">
Admin Support
</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="msg" placeholder="Reply">
<button onclick="send()">Send</button>
</div>

<script>

const supabaseUrl="YOUR_SUPABASE_URL"
const supabaseKey="YOUR_ANON_KEY"

const supabase=supabase.createClient(supabaseUrl,supabaseKey)

async function send(){

let text=document.getElementById("msg").value

if(!text)return

await supabase
.from("messages")
.insert([{sender:"admin",message:text}])

document.getElementById("msg").value=""

}

async function load(){

let {data}=await supabase
.from("messages")
.select("*")
.order("created_at",{ascending:true})

let box=document.getElementById("chat")

box.innerHTML=""

data.forEach(m=>{

let div=document.createElement("div")

div.className="msg "+m.sender

div.innerText=m.message

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

}

load()

setInterval(load,1500)

</script>

</body>
</html>
